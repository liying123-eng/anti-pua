            color: #fff;
            padding: 20px;
            overflow-x: hidden;

        /* 动态背景 */
        .bg-particles {

            top: 0;
            left: 0;

            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {

            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 1;

        /* 标题样式 */
        .main-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            margin-bottom: 30px;
        }

            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .pua-tag {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid rgba(233, 69, 96, 0.4);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #ff6b6b;
            transition: all 0.3s;
        }

        .pua-tag:hover {
            background: rgba(233, 69, 96, 0.4);
            transform: translateY(-2px);
        }

        /* 进度条 */
        .progress-container {
            margin-bottom: 30px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);

            background: rgba(255, 255, 255, 0.1);

            border-radius: 4px;

            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);

            height: 45px;

                    { letter: 'C', text: '开始自责，觉得可能真的是自己的问题', score: 1 },
                    { letter: 'D', text: '完全接受责任，反而为TA"受伤"道歉', score: 0 }
                ]
            },
            {
                icon: '📉',
                puaType: '自我蚕食',
                text: '这段关系后，你发现自己越来越不自信、不快乐。你会？',
                options: [
                    { letter: 'A', text: '认真评估，考虑是否要离开这段关系', score: 3 },
                    { letter: 'B', text: '尝试沟通，希望对方和自己一起改善', score: 2 },
                    { letter: 'C', text: '觉得是自己不够好，加倍努力讨好', score: 1 },
                    { letter: 'D', text: '彻底否定自己，认为所有问题都是自己造成的', score: 0 }
                ]
            },
            {
                icon: '⏳',
                puaType: '拖延承诺',
                text: 'TA一直说"改天给你交代/承诺/改变"，但一直没有任何行动。你会？',
                options: [
                    { letter: 'A', text: '明确追问期限，这是对你的尊重', score: 3 },
                    { letter: 'B', text: '给对方一些时间，但会持续观察', score: 2 },
                    { letter: 'C', text: '不好意思催促，继续无限期等待', score: 1 },
                    { letter: 'D', text: '选择相信TA会改变，无限期等待下去', score: 0 }
                ]
            },
            {
                icon: '🎭',
                puaType: '情绪操控',
                text: 'TA每次吵架就摔东西、大哭、自残威胁："都是你逼我的！" 你会？',
                options: [
                    { letter: 'A', text: '不被动摇，明确表示这不是健康的关系方式', score: 3 },
                    { letter: 'B', text: '感到压力，但知道这是对方的责任', score: 2 },
                    { letter: 'C', text: '被吓到，选择妥协来"安抚"对方', score: 1 },
                    { letter: 'D', text: '彻底被控制，觉得一切都是自己的错', score: 0 }
                ]
            }
        ];

        let currentQ = 0;
        let totalScore = 0;
        const letters = ['A', 'B', 'C', 'D'];

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            const progress = ((currentQ + 1) / questions.length) * 100;
            
            document.getElementById('progress-text').textContent = `问题 ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress-percent').textContent = `${Math.round(progress)}%`;
            document.getElementById('progress-fill').style.width = progress + '%';

            const optionsHtml = q.options.map((opt, idx) => 
                `<div class="option" onclick="selectOption(${idx}, ${opt.score})">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt.text}</span>
                </div>`
            ).join('');

            document.getElementById('question-area').innerHTML = `
                <div class="question-header">
                    <div class="question-icon">${q.icon}</div>
                    <div>
                        <div class="question-num">第 ${currentQ + 1} 题</div>
                        <span class="pua-type">${q.puaType}</span>
                    </div>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
            `;
        }

        function selectOption(idx, score) {
            totalScore += score;
            document.querySelectorAll('.option')[idx].classList.add('selected');

            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 400);
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const maxScore = questions.length * 3;
            const percentage = Math.round((totalScore / maxScore) * 100);

            let resultIcon, resultBadge, resultBadgeColor, resultTitle, resultDesc, abilities, tips;

            if (percentage >= 80) {
                resultIcon = '👑';
                resultBadge = '🛡️ 钻石级防御';
                resultBadgeColor = 'linear-gradient(135deg, #feca57, #ff9f43)';
                resultTitle = '你的情感防御能力非常强！';
                resultDesc = '你拥有极其清晰的自我边界和超强的抗操控能力。在各种情感操控场景中，你都能保持清醒的头脑，不被动摇。这种自我状态让你既能享受健康的亲密关系，又能有效保护自己免受伤害。';
                abilities = [
                    { icon: '✅', text: '边界清晰：你知道自己的底线，并坚决维护' },
                    { icon: '✅', text: '内在稳定：你的价值感来源于自己，不受他人操控' },
                    { icon: '✅', text: '觉察敏锐：你能第一时间识别情感操控的信号' },
                    { icon: '✅', text: '行动果断：该拒绝时果断拒绝，不拖泥带水' },
                    { icon: '✅', text: '情绪独立：不被他人的情绪勒索所左右' }
                ];
                tips = '继续保持这份清醒和力量！你的存在本身就是对PUA最好的反击。同时，也请记得在保护自己的同时，给真心爱你的人一些耐心和信任。世界需要更多像你这样"人间清醒"的人 🌟';
            } else if (percentage >= 60) {
                resultIcon = '🛡️';
                resultBadge = '✨ 黄金级防御';
                resultBadgeColor = 'linear-gradient(135deg, #a29bfe, #6c5ce7)';
                resultTitle = '你的情感防御能力不错！';
                resultDesc = '你具备较好的自我保护意识，大部分情况下能照顾好自己。你的内心有一定的基础，但面对一些高段位的情感操控时，可能会有轻微动摇。这是很正常的，继续加强会更好。';
                abilities = [
                    { icon: '✅', text: '基本边界：有自己的底线，偶尔会被突破' },
                    { icon: '✅', text: '相对独立：重视自己，也会参考他人意见' },
                    { icon: '💡', text: '成长点：面对"煤气灯效应"时可以更坚定' },
                    { icon: '💡', text: '成长点：被内疚诱导时，练习说"这是你的感受，不是我的错"' }
                ];
                tips = '建议每天花10分钟做"自我肯定"练习，对着镜子说：我值得被尊重，我的感受很重要。当遇到让你不舒服的情况时，先深呼吸，然后问自己："这是健康的关系吗？"记住：你的感受永远是你最好的指南针 💎';
            } else if (percentage >= 40) {
                resultIcon = '💡';
                resultBadge = '🌱 青铜级防御';
                resultBadgeColor = 'linear-gradient(135deg, #81ecec, #00cec9)';
                resultTitle = '你的情感防御能力需要加强';
                resultDesc = '你在关系中可能经常处于被动、压抑的状态，习惯优先考虑他人而忽略自己的感受。这不是你的错，而是提醒我们：学会爱自己，是你需要练习的重要课题。';
                abilities = [
                    { icon: '💡', text: '边界待清晰：你经常为了和谐而委屈自己' },
                    { icon: '💡', text: '价值感待稳固：你比较在意他人的看法和评价' },
                    { icon: '💡', text: '表达待练习：你不太习惯为自己的感受发声' },
                    { icon: '💡', text: '支持系统待加强：你可能为了某段关系减少了其他联系' }
                ];
                tips = '从今天开始，尝试这3件事：① 每天对自己说3次"我值得"；② 每周至少和朋友聚会一次；③ 当别人要求你做不想做的事时，练习说"让我考虑一下"（然后真的考虑）。记住：你不是任何人的附属品，你是一个独立的、有价值的人 🌱';
            } else {
                resultIcon = '🌻';
                resultBadge = '🌸 需要关注与成长';
                resultBadgeColor = 'linear-gradient(135deg, #fd79a8, #e84393)';
                resultTitle = '请多关爱自己的内心';
                resultDesc = '你目前在关系中容易处于被动、压抑的状态，可能已经习惯了把他人需求放在第一位，忽略了自己的声音。这不是你的错，而是提醒你：是时候开始学着爱自己了。';
                abilities = [
                    { icon: '🌱', text: '边界待建立：你习惯把他人的需求放在第一位' },
                    { icon: '🌱', text: '自我认知待加强：你可能还不够了解自己' },
                    { icon: '🌱', text: '支持系统待重建：你可能为了某段关系减少了其他联系' },
                    { icon: '🌱', text: '自我价值待重塑：你需要重新认识自己的价值' }
                ];
                tips = '第一步：重新联系信任的朋友或家人，告诉他们你的感受，你不是一个人。第二步：每天对镜子里的自己说："我值得被爱，我值得被尊重。"第三步：当有人让你不舒服时，试着说"不"。第四步：记住，任何让你持续感到痛苦的关系，都不值得你为之牺牲自己。你比你想象的更强大 🌻';
            }

            document.getElementById('result-screen').innerHTML = `
                <div class="result-icon">${resultIcon}</div>
                <h2 class="result-title">${resultTitle}</h2>
                <div class="result-score">${percentage}%</div>
                <div class="result-badge" style="background: ${resultBadgeColor}">${resultBadge}</div>
                
                <div class="result-desc">
                    <p style="font-size: 1.05rem; line-height: 1.8;">${resultDesc}</p>
                </div>
                
                <div class="result-section">
                    <div class="result-section-title">
                        <span>📊</span> 你的防御能力分析
                    </div>
                    ${abilities.map(a => `
                        <div class="ability-item">
                            <span class="ability-icon">${a.icon}</span>
                            <span>${a.text}</span>
                        </div>
                    `).join('')}
                </div>
                
                <div class="tips-box">
                    <div class="tips-title">
                        <span>🌟</span> 成长建议
                    </div>
                    <p>${tips}</p>
                </div>
                
                <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin: 20px 0; text-align: left; line-height: 1.7;">
                    <p style="color: #feca57; font-weight: 600; margin-bottom: 10px;">💝 为自己而活</p>
                    <p>你的人生不是为了让别人满意而存在的。</p>
                    <p style="margin-top: 10px;">你的感受很重要，你的需求值得被满足，你的梦想值得被追求。</p>
                    <p style="margin-top: 10px;">爱自己，是一生浪漫的开始。✨</p>
                </div>
                
                <button class="btn" onclick="location.reload()">再测一次 🔄</button>
                
                <div class="disclaimer">
                    <strong>⚠️ 免责声明：</strong>本测试仅供娱乐参考，旨在提升自我保护意识，不能替代专业心理咨询。如有严重情感困扰，请寻求专业心理咨询师或医生的帮助。
                </div>
            `;
        }
    </script>
